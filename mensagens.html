<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fushub — Mensagens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #1e56ff;
      --blue-2:     #3b73ff;
      --blue-light: rgba(30,86,255,0.12);
      --gold:       #f0a500;
      --navy:       #f5f7fc;
      --navy-2:     #eef1f8;
      --navy-card:  #ffffff;
      --navy-3:     #e8ecf5;
      --border:     rgba(0,0,0,0.08);
      --muted:      #6b7fa3;
      --text:       #1a2540;
      --white:      #ffffff;
      --nav-h:      74px;
      --green:      #22c55e;
    }

    html, body { height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--navy);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ═══════════════════════════════════
       NAVBAR
    ═══════════════════════════════════ */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      height: var(--nav-h);
      background: var(--navy-2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 2rem; gap: 1rem;
    }
    .nav-logo {
      font-size: 1.35rem; font-weight: 800; letter-spacing: -0.02em;
      color: var(--text); text-decoration: none; flex-shrink: 0;
    }
    .nav-logo span { color: var(--gold); }

    .nav-tabs { flex: 1; display: flex; justify-content: center; }
    .nav-tab {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.2rem; padding: 0.5rem 1.6rem;
      color: var(--muted); text-decoration: none;
      font-size: 0.88rem; font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
      cursor: pointer; white-space: nowrap;
    }
    .nav-tab svg { width: 22px; height: 22px; }
    .nav-tab.active { color: var(--text); border-bottom-color: var(--blue); }
    .nav-tab:hover:not(.active) { color: var(--text); }

    .nav-right { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
    .nav-profile {
      display: flex; align-items: center; gap: 0.6rem;
      background: var(--navy-card); border: 1px solid var(--border);
      border-radius: 50px; padding: 0.3rem 0.5rem 0.3rem 0.9rem;
      cursor: pointer; transition: box-shadow .2s, border-color .2s;
      position: relative;
    }
    .nav-profile:hover { border-color: rgba(255,255,255,0.18); box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .nav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 800; color: #fff; flex-shrink: 0;
      overflow: hidden;
    }
    .profile-dropdown {
      position: absolute; top: calc(100% + 0.6rem); right: 0;
      background: var(--navy-card); border: 1px solid var(--border);
      border-radius: 16px; min-width: 200px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5); overflow: hidden;
      opacity: 0; pointer-events: none; transform: translateY(-8px);
      transition: opacity .2s, transform .2s; z-index: 200;
    }
    .nav-profile.open .profile-dropdown { opacity: 1; pointer-events: all; transform: none; }
    .dropdown-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1.1rem; font-size: 0.85rem; color: var(--text);
      cursor: pointer; transition: background .15s; text-decoration: none;
    }
    .dropdown-item:hover { background: rgba(0,0,0,0.04); }
    .dropdown-item svg { width: 16px; height: 16px; stroke: var(--muted); flex-shrink: 0; }
    .dropdown-divider { height: 1px; background: var(--border); margin: 0.3rem 0; }
    .dropdown-item.logout { color: #f87171; }
    .dropdown-item.logout svg { stroke: #f87171; }
    .dropdown-item.active-page { color: var(--blue-2); background: rgba(30,86,255,0.06); }
    .dropdown-item.active-page svg { stroke: var(--blue-2); }

    /* ═══════════════════════════════════
       CHAT LAYOUT
    ═══════════════════════════════════ */
    .chat-layout {
      display: flex;
      height: calc(100vh - var(--nav-h));
      margin-top: var(--nav-h);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 340px; flex-shrink: 0;
      background: var(--navy-2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 1.25rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 1.1rem; font-weight: 800;
      color: var(--text); letter-spacing: -0.02em; margin-bottom: 0.85rem;
    }

    .search-conv {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 0.5rem 0.75rem;
      transition: border-color .2s;
    }
    .search-conv:focus-within { border-color: rgba(30,86,255,0.4); }
    .search-conv svg { width: 15px; height: 15px; stroke: var(--muted); flex-shrink: 0; }
    .search-conv input {
      background: none; border: none; outline: none;
      font-family: inherit; font-size: 0.83rem; color: var(--text); width: 100%;
    }
    .search-conv input::placeholder { color: rgba(132,148,176,0.5); }

    .conv-list { overflow-y: auto; flex: 1; padding: 0.5rem 0; }
    .conv-list::-webkit-scrollbar { width: 4px; }
    .conv-list::-webkit-scrollbar-track { background: transparent; }
    .conv-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.06); border-radius: 4px; }

    .conv-item {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 0.85rem 1.25rem; cursor: pointer;
      transition: background .15s; position: relative;
    }
    .conv-item:hover { background: rgba(0,0,0,0.04); }
    .conv-item.active { background: rgba(30,86,255,0.08); }
    .conv-item.active::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--blue); border-radius: 0 3px 3px 0;
    }

    .conv-avatar {
      width: 46px; height: 46px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 800; color: #fff;
      flex-shrink: 0; position: relative;
    }
    .conv-online-dot {
      position: absolute; bottom: 1px; right: 1px;
      width: 11px; height: 11px; border-radius: 50%;
      background: var(--green);
      border: 2px solid var(--navy-2);
    }

    .conv-info { flex: 1; min-width: 0; }
    .conv-top { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; margin-bottom: 0.2rem; }
    .conv-name { font-size: 0.88rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-time { font-size: 0.7rem; color: var(--muted); flex-shrink: 0; }
    .conv-preview { font-size: 0.78rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-preview.unread { color: var(--text); font-weight: 600; }

    .conv-badge {
      background: var(--blue); color: #fff;
      font-size: 0.65rem; font-weight: 800;
      min-width: 18px; height: 18px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px; flex-shrink: 0;
    }

    .imovel-tag {
      display: inline-block; font-size: 0.65rem; font-weight: 600;
      background: rgba(30,86,255,0.1); color: var(--blue-2);
      border: 1px solid rgba(30,86,255,0.2);
      padding: 0.1rem 0.4rem; border-radius: 4px;
      margin-top: 0.15rem; max-width: 100%;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── CHAT PANEL ── */
    .chat-panel {
      flex: 1; display: flex; flex-direction: column;
      background: var(--navy); overflow: hidden;
    }

    /* Chat header */
    .chat-header {
      display: flex; align-items: center; gap: 1rem;
      padding: 0 1.5rem;
      height: 70px; flex-shrink: 0;
      background: var(--navy-2);
      border-bottom: 1px solid var(--border);
    }
    .chat-header-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem; font-weight: 800; color: #fff; flex-shrink: 0;
      position: relative;
    }
    .chat-online-dot {
      position: absolute; bottom: 0; right: 0;
      width: 11px; height: 11px; border-radius: 50%;
      background: var(--green);
      border: 2px solid var(--navy-2);
    }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-size: 0.95rem; font-weight: 800; color: var(--text); }
    .chat-header-status { font-size: 0.75rem; color: var(--green); font-weight: 600; }
    .chat-header-status.offline { color: var(--muted); }

    .chat-header-imovel {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--navy-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.45rem 0.85rem;
      font-size: 0.75rem; color: var(--muted);
      max-width: 260px;
    }
    .chat-header-imovel svg { width: 13px; height: 13px; stroke: var(--muted); flex-shrink: 0; }
    .chat-header-imovel span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .chat-header-actions { display: flex; gap: 0.5rem; }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--navy-card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .15s, border-color .2s;
      color: var(--muted);
    }
    .icon-btn:hover { background: rgba(0,0,0,0.06); border-color: var(--border); color: var(--text); }
    .icon-btn svg { width: 16px; height: 16px; stroke: currentColor; }

    /* Messages area */
    .messages-area {
      flex: 1; overflow-y: auto;
      padding: 1.5rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.06); border-radius: 4px; }

    .date-divider {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 0.75rem 0; color: var(--muted); font-size: 0.72rem; font-weight: 600;
    }
    .date-divider::before, .date-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .msg-row {
      display: flex; align-items: flex-end; gap: 0.6rem;
      animation: msgIn .2s ease both;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.mine { flex-direction: row-reverse; }

    /* wrapper do balão — limita a largura máxima corretamente */
    .msg-row > div {
      max-width: 72%;
      min-width: 0;
    }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .msg-avatar.hidden { visibility: hidden; }

    .msg-bubble {
      padding: 0.65rem 0.9rem;
      border-radius: 16px; font-size: 0.875rem; line-height: 1.5;
      word-break: break-word;
      overflow-wrap: break-word;
      display: block;
    }
    .msg-row:not(.mine) .msg-bubble {
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .msg-row.mine .msg-bubble {
      background: var(--blue);
      border-bottom-right-radius: 4px;
      color: #fff;
    }
    .msg-time {
      font-size: 0.65rem; color: var(--muted);
      margin-top: 0.3rem; text-align: right;
    }
    .msg-row:not(.mine) .msg-time { color: var(--muted); text-align: left; }
    .msg-row.mine .msg-time { color: var(--muted); text-align: right; }

    .msg-status { font-size: 0.68rem; color: rgba(255,255,255,0.6); margin-top: 0.15rem; text-align: right; }
    .msg-status.read { color: var(--blue-2); }

    /* Typing indicator */
    .typing-indicator {
      display: flex; align-items: flex-end; gap: 0.6rem;
      padding-top: 0.25rem;
    }
    .typing-dots {
      background: var(--navy-card); border: 1px solid var(--border);
      border-radius: 16px; border-bottom-left-radius: 4px;
      padding: 0.65rem 1rem;
      display: flex; gap: 4px; align-items: center;
    }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Input area */
    .chat-input-area {
      padding: 1rem 1.5rem;
      background: var(--navy-2);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex; align-items: flex-end; gap: 0.75rem;
    }

    .input-wrap {
      flex: 1;
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex; align-items: flex-end; gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      transition: border-color .2s;
    }
    .input-wrap:focus-within {
      border-color: rgba(30,86,255,0.4);
      box-shadow: 0 0 0 3px rgba(30,86,255,0.08);
    }

    .attach-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 0.2rem;
      display: flex; align-items: center;
      transition: color .2s; flex-shrink: 0;
    }
    .attach-btn:hover { color: var(--text); }
    .attach-btn svg { width: 18px; height: 18px; stroke: currentColor; }

    /* Mensagem com imagem */
    .msg-image {
      max-width: 220px; max-height: 220px;
      border-radius: 10px; display: block;
      cursor: pointer; margin-top: 0.3rem;
      object-fit: cover;
      transition: opacity .2s;
    }
    .msg-image:hover { opacity: 0.88; }

    /* Mensagem com arquivo genérico */
    .msg-file {
      display: flex; align-items: center; gap: 0.5rem;
      background: rgba(0,0,0,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 0.55rem 0.8rem;
      margin-top: 0.3rem; cursor: pointer;
      transition: background .2s; text-decoration: none;
      color: var(--text); font-size: 0.82rem;
    }
    .msg-file:hover { background: rgba(0,0,0,0.06); }
    .msg-file svg { width: 16px; height: 16px; stroke: var(--blue-2); flex-shrink: 0; }

    /* Modal de imagem ampliada */
    .img-lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88); z-index: 9999;
      align-items: center; justify-content: center;
    }
    .img-lightbox.open { display: flex; }
    .img-lightbox img { max-width: 92vw; max-height: 88vh; border-radius: 12px; }
    .img-lightbox-close {
      position: absolute; top: 1rem; right: 1.2rem;
      background: none; border: none; color: var(--text);
      font-size: 1.8rem; cursor: pointer; line-height: 1;
    }

    /* Modal de perfil público do usuário */
    .user-profile-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.72); z-index: 9998;
      align-items: center; justify-content: center;
      padding: 1rem;
    }
    .user-profile-modal.open { display: flex; }
    .user-profile-card {
      background: var(--navy-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 1.8rem 1.6rem 1.6rem;
      max-width: 360px; width: 100%;
      position: relative; max-height: 90vh; overflow-y: auto;
    }
    .user-profile-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; color: var(--muted);
      font-size: 1.2rem; cursor: pointer; line-height: 1;
      transition: color .2s;
    }
    .user-profile-close:hover { color: var(--text); }

    /* Avatar */
    .user-profile-avatar-wrap { text-align: center; margin-bottom: 0.9rem; }
    .user-profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 800; color: #fff;
      overflow: hidden;
    }
    .user-profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* Nome */
    .user-profile-name {
      text-align: center; font-size: 1.1rem; font-weight: 800;
      color: var(--text); margin-bottom: 0.2rem;
    }
    /* Curso · Faculdade */
    .user-profile-curso {
      text-align: center; font-size: 0.78rem; color: var(--blue-2);
      font-weight: 600; margin-bottom: 0.85rem; min-height: 1rem;
    }
    /* Bio */
    .user-profile-bio {
      font-size: 0.82rem; color: var(--muted); line-height: 1.55;
      text-align: center; margin-bottom: 0.85rem;
      font-style: italic; min-height: 1rem;
    }
    /* Cidade + Faculdade pill row */
    .user-profile-meta {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      justify-content: center; margin-bottom: 0.75rem;
    }
    .up-pill {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: rgba(0,0,0,0.04); border: 1px solid var(--border);
      border-radius: 50px; padding: 0.3rem 0.75rem;
      font-size: 0.75rem; color: var(--text);
    }
    .up-pill svg { width: 12px; height: 12px; stroke: var(--muted); flex-shrink: 0; }
    /* Imóvel */
    .user-profile-imovel {
      background: rgba(30,86,255,0.07); border: 1px solid rgba(30,86,255,0.18);
      border-radius: 10px; padding: 0.55rem 0.85rem;
      font-size: 0.78rem; color: var(--text);
      display: flex; align-items: center; gap: 0.45rem;
      margin-bottom: 0.85rem;
    }
    .user-profile-imovel svg { width: 14px; height: 14px; stroke: var(--blue-2); flex-shrink: 0; }
    /* Interesses */
    .user-profile-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; }
    .up-tag {
      background: rgba(0,0,0,0.04); border: 1px solid var(--border);
      border-radius: 50px; padding: 0.25rem 0.7rem;
      font-size: 0.75rem; color: var(--muted);
    }
    .btn-ver-perfil {
      display: flex; align-items: center; justify-content: center; gap: 0.45rem;
      width: 100%; margin-top: 1.1rem;
      padding: 0.7rem; border-radius: 10px;
      background: var(--blue); color: #fff;
      border: none; font-family: inherit; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; transition: background .18s, transform .15s;
      text-decoration: none;
    }
    .btn-ver-perfil:hover { background: var(--blue-2); transform: translateY(-1px); }

    .msg-input {
      flex: 1; background: none; border: none; outline: none;
      font-family: inherit; font-size: 0.88rem;
      color: var(--text); resize: none;
      max-height: 120px; line-height: 1.5;
      padding: 0.2rem 0;
      scrollbar-width: none;
    }
    .msg-input::-webkit-scrollbar { display: none; }
    .msg-input::placeholder { color: rgba(132,148,176,0.5); }

    .emoji-btn {
      background: none; border: none; cursor: pointer;
      font-size: 1.15rem; padding: 0.1rem; flex-shrink: 0;
      opacity: 0.6; transition: opacity .2s, transform .2s;
    }
    .emoji-btn:hover { opacity: 1; transform: scale(1.15); }

    .send-btn {
      width: 44px; height: 44px; border-radius: 13px;
      background: var(--blue); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .15s; flex-shrink: 0;
    }
    .send-btn:hover { background: #2d64ff; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn svg { width: 18px; height: 18px; stroke: #fff; }

    /* ── EMPTY STATE (no conversation selected) ── */
    .chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--muted); text-align: center; padding: 2rem;
    }
    .chat-empty-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(30,86,255,0.08);
      border: 1px solid rgba(30,86,255,0.15);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.25rem;
    }
    .chat-empty-icon svg { width: 32px; height: 32px; stroke: var(--blue-2); opacity: 0.6; }
    .chat-empty h3 { font-size: 1.1rem; font-weight: 800; color: var(--text); margin-bottom: 0.4rem; }
    .chat-empty p { font-size: 0.85rem; max-width: 260px; line-height: 1.6; }

    /* ── EMOJI PICKER ── */
    .emoji-picker {
      position: absolute; bottom: calc(100% + 0.5rem); right: 0;
      background: var(--navy-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 0.75rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      display: none; z-index: 50;
      font-size: 1.4rem; line-height: 2; letter-spacing: 0.1rem;
      max-width: 240px;
    }
    .emoji-picker.open { display: block; }
    .emoji-picker span { cursor: pointer; display: inline-block; transition: transform .15s; }

    /* ── BACK BUTTON (mobile) ── */

      display: none; background: none; border: none;
      cursor: pointer; color: var(--muted); padding: 0.2rem;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {

  <script>
    // ── DATA ──────────────────────────────────────────────────────────────
    const ME = { name: 'Você', initials: 'JS', color: '#1e56ff' };

    const CONVERSATIONS = [];

    // ── CHAVE DE STORAGE POR USUÁRIO ─────────────────────────────────────
    function userHash() {
      const email = sessionStorage.getItem('fushub_sessao_id') || 'guest';
      let h = 0;
      for (let i = 0; i < email.length; i++) h = ((h << 5) + h) ^ email.charCodeAt(i);
      return (h >>> 0).toString(16);
    }

    // Chave para a lista de conversas (metadados sem mensagens)
    function convListKey()      { return 'fushub_convs_'  + userHash(); }
    // Chave para as mensagens de uma conversa
    function storageKey(convId) { return 'fushub_msgs_'   + userHash() + '_' + convId; }

    // Persiste a lista de conversas (sem o array messages, que fica separado)
    function salvarListaConversas() {
      try {
        const meta = CONVERSATIONS.map(cv => ({
          id:        cv.id,
          name:      cv.name,
          email:     cv.email,
          initials:  cv.initials,
          color:     cv.color,
          avatarUrl: cv.avatarUrl || '',
          online:    cv.online,
          imovel:    cv.imovel,
          imovelId:  cv.imovelId,
          unread:    cv.unread,
        }));
        localStorage.setItem(convListKey(), JSON.stringify(meta));
      } catch(e) {}
    }

    // Carrega a lista de conversas do localStorage e preenche CONVERSATIONS
    function carregarListaConversas() {
      try {
        const raw = localStorage.getItem(convListKey());
        if (!raw) return;
        const meta = JSON.parse(raw);
        meta.forEach(cv => {
          if (!CONVERSATIONS.find(x => x.id === cv.id)) {
            CONVERSATIONS.push({ ...cv, messages: [] });
          }
        });
      } catch(e) {}
    }

    function salvarMensagens(conv) {
      try {
        const dados = conv.messages.map(m => ({
          from: m.from, text: m.text || '', time: m.time, date: m.date,
          ts:   m.ts   || null,
          tipo: m.tipo || 'texto',
          fileName: m.fileName || null,
          fileData: m.fileData || null,
          fileUrl:  m.fileUrl  || null,
        }));
        localStorage.setItem(storageKey(conv.id), JSON.stringify(dados));
      } catch(e) {
        conv.messages.forEach(m => { if (m.fileData && m.from === 'me') delete m.fileData; });
        try { localStorage.setItem(storageKey(conv.id), JSON.stringify(conv.messages)); } catch(_) {}
      }
    }

    function carregarMensagens(conv) {
      try {
        const raw = localStorage.getItem(storageKey(conv.id));
        if (raw) conv.messages = JSON.parse(raw);
      } catch(e) {}
    }

    let activeConvId = null;
    let typingTimer = null;
    let isMobile = window.innerWidth <= 768;

    // ── Helper: renderiza avatar (foto ou iniciais) ──────────────────
    function avatarHtmlFor(conv, size) {
      const s = size || '100%';
      if (conv.avatarUrl) {
        return `<img src="${conv.avatarUrl}" alt="${conv.name}" style="width:${s};height:${s};object-fit:cover;border-radius:50%;display:block;" />`;
      }
      return conv.initials;
    }

    // ── INIT ─────────────────────────────────────────────────────────────
    function init() {
      const el = document.getElementById('navAvatar');
      const initials = FushubAuth.getInitials();
      if (el) {
        ME.initials = initials;
        // Mostra foto de perfil se o usuário tiver uma
        try {
          const user = FushubAuth.getUser();
          const pub  = user ? JSON.parse(localStorage.getItem('fushub_perfil_publico_' + (user.email||'').toLowerCase()) || 'null') : null;
          if (pub && pub.avatarUrl) {
            el.innerHTML = `<img src="${pub.avatarUrl}" alt="${initials}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;">`;
          } else {
            el.textContent = initials;
          }
        } catch(e) { el.textContent = initials; }
      }

      // Carrega lista de conversas salvas e depois as mensagens de cada uma
      carregarListaConversas();
      CONVERSATIONS.forEach(c => carregarMensagens(c));

      renderConvList(CONVERSATIONS);

      // Verifica se chegou da página de detalhes com pedido de nova conversa
      const msgImovelId    = sessionStorage.getItem('fushub_msg_imovel');
      const msgDonoEmail   = sessionStorage.getItem('fushub_msg_dono_email');
      const msgImovelTitulo= sessionStorage.getItem('fushub_msg_imovel_titulo');
      const msgDonoAvatar  = sessionStorage.getItem('fushub_msg_dono_avatar') || '';

      if (msgImovelId && msgDonoEmail) {
        sessionStorage.removeItem('fushub_msg_imovel');
        sessionStorage.removeItem('fushub_msg_dono_email');
        sessionStorage.removeItem('fushub_msg_imovel_titulo');
        sessionStorage.removeItem('fushub_msg_dono_avatar');
        abrirOuCriarConversa(msgDonoEmail, msgImovelTitulo || 'Imóvel', msgImovelId, msgDonoAvatar);
      } else if (!isMobile && CONVERSATIONS.length > 0) {
        openConv(CONVERSATIONS[0].id);
      }

      // Emoji picker items
      document.querySelectorAll('#emojiPicker span').forEach(span => {
        span.onclick = () => insertEmoji(span.textContent);
      });

      // Build emoji spans
      const picker = document.getElementById('emojiPicker');
      picker.innerHTML = ['😊','😂','❤️','👍','🙏','😍','🤔','😅','🎉','🏠','📍','💰','✅','⭐','🔑','📅','👋','🤝','💬','😎','🙂','😮','🥳','💪','🏡']
        .map(e => `<span onclick="insertEmoji('${e}')">${e}</span>`).join(' ');
    }

    // ── ABRE OU CRIA CONVERSA COM ANFITRIÃO ──────────────────────────────
    function abrirOuCriarConversa(donoEmail, imovelTitulo, imovelId, avatarUrl) {
      // Tenta achar conversa existente para esse imóvel
      const existing = CONVERSATIONS.find(cv =>
        cv.email === donoEmail && String(cv.imovelId) === String(imovelId)
      );
      if (existing) {
        // Atualiza avatar se agora tiver
        if (avatarUrl && !existing.avatarUrl) {
          existing.avatarUrl = avatarUrl;
          salvarListaConversas();
        }
        openConv(existing.id);
        return;
      }

      // Busca dados do anfitrião no perfil público
      let anfNome = 'Anfitrião';
      let anfColor = '#1e56ff';
      let anfInitials = 'AF';
      let anfAvatar = avatarUrl || '';
      try {
        const perfil = JSON.parse(localStorage.getItem('fushub_perfil_publico_' + donoEmail.toLowerCase()) || 'null');
        if (perfil) {
          anfNome = [perfil.nome, perfil.sobrenome].filter(Boolean).join(' ') || anfNome;
          anfInitials = anfNome.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || 'AF';
          if (perfil.avatarUrl) anfAvatar = perfil.avatarUrl;
        }
      } catch(e) {}

      const novaId = Date.now();
      const colors = ['#1e56ff','#7c3aed','#e11d48','#059669','#d97706','#0891b2'];
      anfColor = colors[anfNome.charCodeAt(0) % colors.length];

      const novaConv = {
        id: novaId,
        name: anfNome,
        email: donoEmail,
        initials: anfInitials,
        color: anfColor,
        avatarUrl: anfAvatar,
        online: true,
        imovel: imovelTitulo,
        imovelId: imovelId,
        unread: 0,
        messages: [],
      };

      CONVERSATIONS.unshift(novaConv);
      salvarListaConversas();
      renderConvList(CONVERSATIONS);
      openConv(novaId);
    }

    // ── CONV LIST ─────────────────────────────────────────────────────────
    function renderConvList(list) {
      // Atualiza avatarUrl de todas as conversas com a foto mais recente do perfil
      list.forEach(cv => {
        try {
          const p = JSON.parse(localStorage.getItem('fushub_perfil_publico_' + (cv.email||'').toLowerCase()) || 'null');
          if (p) cv.avatarUrl = p.avatarUrl || '';
        } catch(e) {}
      });
      const ul = document.getElementById('convList');
      if (list.length === 0) {
        ul.innerHTML = `<div style="padding:2rem 1.5rem;text-align:center;color:var(--muted);font-size:0.85rem;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 0.75rem;display:block;opacity:0.4"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <p style="font-weight:600;color:#fff;margin-bottom:0.3rem">Nenhuma conversa ainda</p>
          <p>Quando um usuário entrar em contato sobre um imóvel, a conversa aparece aqui.</p>
        </div>`;
        return;
      }
      ul.innerHTML = list.map(c => {
        const last = c.messages[c.messages.length - 1];
        const preview = last ? (last.from === 'me' ? 'Você: ' + last.text : last.text) : '';
        return `
        <div class="conv-item ${activeConvId === c.id ? 'active' : ''}" id="conv-${c.id}" onclick="openConv(${c.id})">
          <div class="conv-avatar" style="background:${c.color}">
            ${c.avatarUrl ? `<img src="${c.avatarUrl}" alt="${c.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;" />` : c.initials}
            ${c.online ? '<div class="conv-online-dot"></div>' : ''}
          </div>
          <div class="conv-info">
            <div class="conv-top">
              <div class="conv-name">${c.name}</div>
              <div class="conv-time">${last ? last.time : ''}</div>
            </div>
            <div class="conv-preview ${c.unread > 0 ? 'unread' : ''}">${preview.slice(0, 45)}${preview.length > 45 ? '…' : ''}</div>
            <div class="imovel-tag">🏠 ${c.imovel}</div>
          </div>
          ${c.unread > 0 ? `<div class="conv-badge">${c.unread}</div>` : ''}
        </div>`;
      }).join('');
    }

    function filterConvs() {
      const q = document.getElementById('searchConv').value.toLowerCase();
      const filtered = q ? CONVERSATIONS.filter(c =>
        c.name.toLowerCase().includes(q) || c.imovel.toLowerCase().includes(q)
      ) : CONVERSATIONS;
      renderConvList(filtered);
    }

    // ── OPEN CONVERSATION ─────────────────────────────────────────────────
    function openConv(id) {
      activeConvId = id;
      const conv = CONVERSATIONS.find(c => c.id === id);
      if (!conv) return;

      conv.unread = 0;
      renderConvList(CONVERSATIONS);

      if (isMobile) {
        document.getElementById('sidebar').classList.add('hidden');
        document.getElementById('chatPanel').classList.remove('hidden');
      }

      document.getElementById('chatEmpty').style.display = 'none';
      const ac = document.getElementById('activeChat');
      ac.style.display = 'flex';

      // Header — sempre busca foto fresca do localStorage (reflete mudanças no perfil)
      try {
        const perfilFresco = JSON.parse(localStorage.getItem('fushub_perfil_publico_' + (conv.email||'').toLowerCase()) || 'null');
        if (perfilFresco && perfilFresco.avatarUrl) conv.avatarUrl = perfilFresco.avatarUrl;
        else if (perfilFresco && !perfilFresco.avatarUrl) conv.avatarUrl = '';
      } catch(e) {}

      const avatar = document.getElementById('chatHeaderAvatar');
      avatar.style.background = conv.avatarUrl ? 'transparent' : conv.color;
      avatar.innerHTML = conv.avatarUrl
        ? `<img src="${conv.avatarUrl}" alt="${escHtml(conv.name)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;" />`
        : conv.initials;
      avatar.style.cursor = 'pointer';
      avatar.onclick = () => openUserProfile(conv);

      const nameEl = document.getElementById('chatHeaderName');
      nameEl.textContent = conv.name;
      nameEl.style.cursor = 'pointer';
      nameEl.onclick = () => openUserProfile(conv);

      const dot = document.getElementById('chatOnlineDot');
      dot.style.display = conv.online ? 'inline-block' : 'none';
      const status = document.getElementById('chatHeaderStatus');
      status.innerHTML = (conv.online
        ? `<span class="chat-online-dot" id="chatOnlineDot" style="position:relative;display:inline-block;vertical-align:middle;margin-right:4px;"></span>Online agora`
        : `<span class="chat-online-dot" id="chatOnlineDot" style="display:none"></span>Visto por último há 2h`);
      status.className = 'chat-header-status' + (conv.online ? '' : ' offline');
      document.getElementById('chatImovelText').textContent = conv.imovel;

      renderMessages(conv);
      document.getElementById('msgInput').focus();
    }

    // ── RENDER MESSAGES ───────────────────────────────────────────────────
    function renderMessages(conv) {
      const area = document.getElementById('messagesArea');
      let lastDateLabel = null;
      let html = '';

      conv.messages.forEach((msg, i) => {
        // Usa ts (ISO) para calcular a data real; fallback para campo date legado
        const dateLabel = msg.ts ? isoToDateLabel(msg.ts) : (msg.date || 'Hoje');
        // Usa ts para hora precisa; fallback para campo time legado
        const timeLabel = msg.ts ? isoToTime(msg.ts) : (msg.time || '');

        if (dateLabel !== lastDateLabel) {
          html += `<div class="date-divider">${dateLabel}</div>`;
          lastDateLabel = dateLabel;
        }

        const isMe = msg.from === 'me';
        const next = conv.messages[i + 1];
        const sameNext = next && next.from === msg.from;
        // showAvatar controla só o avatar — hora aparece em TODAS as mensagens
        const showAvatar = !sameNext;

        const avatarHtml = isMe
          ? `<div class="msg-avatar ${showAvatar ? '' : 'hidden'}" style="background:${ME.color}">${ME.initials}</div>`
          : `<div class="msg-avatar ${showAvatar ? '' : 'hidden'}" style="background:${conv.color};cursor:pointer;overflow:hidden;" onclick="openUserProfile(CONVERSATIONS.find(c=>c.id===${conv.id}))">
              ${conv.avatarUrl ? `<img src="${conv.avatarUrl}" alt="${conv.initials}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;" />` : conv.initials}
             </div>`;

        // Conteúdo: texto, imagem ou arquivo
        let conteudo = '';
        if (msg.tipo === 'imagem' && msg.fileData) {
          conteudo = `<img class="msg-image" src="${msg.fileData}" alt="${escHtml(msg.fileName||'imagem')}" onclick="abrirLightbox('${msg.fileData}')" />`;
          if (msg.text) conteudo += `<div class="msg-bubble" style="margin-top:0.3rem">${escHtml(msg.text)}</div>`;
        } else if (msg.tipo === 'arquivo' && msg.fileData) {
          conteudo = `<a class="msg-file" href="${msg.fileData}" download="${escHtml(msg.fileName||'arquivo')}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
            ${escHtml(msg.fileName||'arquivo')}
          </a>`;
        } else {
          conteudo = `<div class="msg-bubble">${escHtml(msg.text)}</div>`;
        }

        html += `
          <div class="msg-row ${isMe ? 'mine' : ''}">
            ${avatarHtml}
            <div>
              ${conteudo}
              <div class="msg-time">${timeLabel}</div>
              ${isMe && showAvatar ? `<div class="msg-status read">✓✓ Lido</div>` : ''}
            </div>
          </div>`;
      });

      area.innerHTML = html;
      area.scrollTop = area.scrollHeight;
    }

    // ── SEND MESSAGE ──────────────────────────────────────────────────────
    function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || activeConvId === null) return;

      const conv = CONVERSATIONS.find(c => c.id === activeConvId);
      const _ts = nowISO();
      conv.messages.push({ from: 'me', text, time: nowTime(), date: 'Hoje', tipo: 'texto', ts: _ts });
      input.value = '';
      input.style.height = 'auto';

      salvarMensagens(conv);
      salvarListaConversas();
      renderMessages(conv);
      renderConvList(CONVERSATIONS);
      // Dispara notificação de nova mensagem para o destinatário
      if (window.FushubNotif) FushubNotif.mensagem(conv);

    }

    // ── HANDLE FILE ATTACH ────────────────────────────────────────────────
    function handleFileAttach(event) {
      if (activeConvId === null) return;
      const conv = CONVERSATIONS.find(c => c.id === activeConvId);
      const files = Array.from(event.target.files);
      if (!files.length) return;

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const dataUrl = e.target.result;
          const isImage = file.type.startsWith('image/');
          const _fts = nowISO();
          conv.messages.push({
            from: 'me',
            text: '',
            time: nowTime(),
            date: 'Hoje',
            tipo: isImage ? 'imagem' : 'arquivo',
            fileName: file.name,
            fileData: dataUrl,
            ts: _fts,
          });
          salvarMensagens(conv);
          renderMessages(conv);
          renderConvList(CONVERSATIONS);
        };
        reader.readAsDataURL(file);
      });

      // Limpa o input para permitir re-envio do mesmo arquivo
      event.target.value = '';
    }

    // ── LIGHTBOX ──────────────────────────────────────────────────────────
    function abrirLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('imgLightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('imgLightbox').classList.remove('open');
    }

    // ── USER PROFILE MODAL ────────────────────────────────────────────────
    function openUserProfile(conv) {
      if (!conv) return;

      // Busca o perfil público pelo email do usuário da conversa.
      // A chave fushub_perfil_publico_{email} é gravada pelo perfil.html
      // sempre que o usuário salva o perfil ou se cadastra.
      let perfil = {};
      if (conv.email) {
        try {
          const raw = localStorage.getItem('fushub_perfil_publico_' + conv.email.toLowerCase().trim());
          if (raw) perfil = JSON.parse(raw);
        } catch(e) {}
      }

      // Avatar: foto de perfil ou iniciais com cor da conversa
      const avatarEl = document.getElementById('upAvatar');
      avatarEl.style.background = conv.color;
      if (perfil.avatarUrl) {
        avatarEl.innerHTML = `<img src="${perfil.avatarUrl}" alt="${escHtml(conv.name)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" />`;
      } else {
        avatarEl.textContent = conv.initials;
      }

      // Nome: do perfil público ou da conversa como fallback
      const nomeCompleto = [perfil.nome, perfil.sobrenome].filter(Boolean).join(' ');
      document.getElementById('upName').textContent = nomeCompleto || conv.name;

      // Curso · Faculdade
      const cursoFac = [perfil.curso, perfil.faculdade].filter(Boolean).join(' · ');
      document.getElementById('upCurso').textContent = cursoFac;

      // Bio
      document.getElementById('upBio').textContent = perfil.bio || '';

      // Pills: cidade e faculdade
      const metaEl = document.getElementById('upMeta');
      const pills = [];
      if (perfil.cidade) pills.push(`
        <span class="up-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${escHtml(perfil.cidade)}
        </span>`);
      if (perfil.faculdade) pills.push(`
        <span class="up-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
          ${escHtml(perfil.faculdade)}
        </span>`);
      metaEl.innerHTML = pills.join('');

      // Imóvel da conversa
      const imovelEl = document.getElementById('upImovel');
      if (conv.imovel) {
        imovelEl.style.display = 'flex';
        imovelEl.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
          ${escHtml(conv.imovel)}`;
      } else {
        imovelEl.style.display = 'none';
      }

      // Interesses
      const tagsEl = document.getElementById('upTags');
      if (perfil.interesses && perfil.interesses.length) {
        tagsEl.innerHTML = perfil.interesses.map(t => `<span class="up-tag">${escHtml(t)}</span>`).join('');
      } else {
        tagsEl.innerHTML = '';
      }

      // Atualiza o link "Ver perfil completo" com o email do usuário
      const btnPerfil = document.getElementById('upVerPerfil');
      if (conv.email) {
        btnPerfil.href = 'perfil-publico.html?email=' + encodeURIComponent(conv.email);
      } else {
        btnPerfil.href = 'perfil-publico.html';
      }

      document.getElementById('userProfileModal').classList.add('open');
    }

    function closeUserProfile(e) {
      if (!e || e.target === document.getElementById('userProfileModal')) {
        document.getElementById('userProfileModal').classList.remove('open');
      }
    }

    function showTyping(conv) {
      const area = document.getElementById('messagesArea');
      const div = document.createElement('div');
      div.id = 'typingIndicator';
      div.className = 'typing-indicator';
      div.innerHTML = `
        <div class="msg-avatar" style="background:${conv.color};overflow:hidden;">${conv.avatarUrl ? `<img src="${conv.avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;" />` : conv.initials}</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>`;
      area.appendChild(div);
      area.scrollTop = area.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function nowTime() {
      const d = new Date();
      return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }

    // ISO timestamp salvo junto com cada mensagem para calcular data/hora corretamente
    function nowISO() { return new Date().toISOString(); }

    // Converte ISO para "HH:MM"
    function isoToTime(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
      } catch(e) { return ''; }
    }

    // Converte ISO para label de data: "Hoje", "Ontem" ou "DD/MM/AAAA"
    function isoToDateLabel(iso) {
      if (!iso) return 'Hoje';
      try {
        const msgDate = new Date(iso);
        // Compara usando yyyy-mm-dd no fuso local para evitar bug de UTC vs local
        const localStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        const hoje  = new Date();
        const ontem = new Date(); ontem.setDate(ontem.getDate() - 1);
        if (localStr(msgDate) === localStr(hoje))  return 'Hoje';
        if (localStr(msgDate) === localStr(ontem)) return 'Ontem';
        // Formata como "quarta-feira, 09 de abril"
        return msgDate.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long' });
      } catch(e) { return 'Hoje'; }
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    function toggleEmoji() {
      document.getElementById('emojiPicker').classList.toggle('open');
    }

    function insertEmoji(emoji) {
      const input = document.getElementById('msgInput');
      input.value += emoji;
      input.focus();
      document.getElementById('emojiPicker').classList.remove('open');
    }

    document.addEventListener('click', e => {
      const picker = document.getElementById('emojiPicker');
      if (!e.target.closest('.emoji-btn') && !e.target.closest('#emojiPicker'))
        picker.classList.remove('open');
      const p = document.getElementById('navProfile');
      if (p && !p.contains(e.target)) p.classList.remove('open');
    });

    function goBack() {
      document.getElementById('sidebar').classList.remove('hidden');
      document.getElementById('chatPanel').classList.add('hidden');
      activeConvId = null;
    }

    function toggleProfileMenu() {
      document.getElementById('navProfile').classList.toggle('open');
    }


    // Esconde "Tornar-se anfitrião" se o usuário já for anfitrião
    (function() {
      var lnk = document.getElementById('linkAnfitriao');
      if (lnk && typeof FushubAuth !== 'undefined' && FushubAuth.isAnfitriao()) {
        lnk.style.display = 'none';
        var prev = lnk.previousElementSibling;
        if (prev && prev.classList.contains('dropdown-divider')) prev.style.display = 'none';
      }
    })();

    function logout() { FushubAuth.logout(); }

    window.addEventListener('resize', () => {
      isMobile = window.innerWidth <= 768;
      if (!isMobile) {
        document.getElementById('sidebar').classList.remove('hidden');
        document.getElementById('chatPanel').classList.remove('hidden');
      }
    });

    init();
  </script>
</body>
